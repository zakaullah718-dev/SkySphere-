<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SkySphere Real-Time Weather Radar</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <!-- Include Leaflet CSS and JS with fail-safe fallbacks -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css';" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js';"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #070913; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background: #070913; }
        
        /* Premium glowing loader indicator */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.88);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid rgba(0, 229, 255, 0.35);
            font-size: 14px;
            font-weight: 700;
            color: #00E5FF;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Ambient warning toast */
        #api-warning {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: rgba(30, 41, 59, 0.92);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 12px;
            color: #F87171;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.85; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
            50% { opacity: 1; box-shadow: 0 10px 35px rgba(0, 229, 255, 0.2); }
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Custom GPS marker pulsation */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00E5FF;
            border: 3px solid #FFFFFF;
            box-shadow: 0 0 12px #00E5FF;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        .leaflet-container {
            background: #070913 !important;
        }
        .leaflet-control-zoom, .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loader">Fetching Doppler Radar...</div>
    <div id="api-warning">Radar temporarily unavailable</div>

    <div id="error-overlay" style="position: absolute; top: 0; bottom: 0; left: 0; right: 0; background-color: #070913; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 24px; z-index: 2000; font-family: sans-serif;">
        <div style="font-size: 54px; margin-bottom: 20px;">🌐</div>
        <div style="font-size: 20px; font-weight: bold; color: #FF5252; margin-bottom: 12px;" id="error-title">Map Interface Unreachable</div>
        <div style="font-size: 14px; color: #A0AEC0; max-width: 300px; line-height: 1.6; margin-bottom: 24px;" id="error-desc">Initializing map telemetry engine...</div>
        <button onclick="window.location.reload();" style="background: rgba(0, 229, 255, 0.15); border: 1px solid #00E5FF; color: #00E5FF; padding: 10px 24px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Reload Map</button>
    </div>

    <script>
        // Global error boundary
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('JS Error Boundary: ' + message + ' at ' + (source || 'unknown') + ':' + lineno);
            return false;
        };

        var map = null;
        var mapLoaded = false;
        var currentLayerType = 'RAINFALL';
        var weatherApiKey = '';
        var maptilerApiKey = '';
        var currentGpsMarker = null;

        var baseTileLayer = null;
        var nonRadarWeatherTileLayer = null;

        // Radar tile layer caching pool: { [timestamp]: L.TileLayer }
        var radarTileLayers = {};
        var radarFrames = []; // Array of frame objects { time, path, tileUrl }
        var activeTimelineIndex = 3; // Default to 'Now'
        var rainViewerHost = 'https://tilecache.rainviewer.com';

        function logAndroid(msg) {
            console.log('[RadarOverlayManager] ' + msg);
        }

        function logErrorAndroid(msg) {
            console.error('[RadarOverlayManager] ' + msg);
        }

        function showError(title, desc) {
            logErrorAndroid('Error Overlay Shown: ' + title + ' - ' + desc);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = desc;
            document.getElementById('error-overlay').style.display = 'flex';
        }

        function showRadarUnavailable(msg) {
            var warningEl = document.getElementById('api-warning');
            warningEl.innerText = msg || 'Radar temporarily unavailable';
            warningEl.style.display = 'block';
            logErrorAndroid('Radar temporarily unavailable');
        }

        function hideRadarUnavailable() {
            var warningEl = document.getElementById('api-warning');
            warningEl.style.display = 'none';
        }

        // Initialize Map Engine
        function initializeMapEngine() {
            try {
                logAndroid('Radar initialized');
                
                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false,
                    minZoom: 1,
                    maxZoom: 16
                }).setView([20, 0], 2.2);

                updateBaseMap();

                setTimeout(function() {
                    mapLoaded = true;
                    if (window.AndroidMap) {
                        window.AndroidMap.onMapLoaded();
                    }
                    if (window.AndroidRadar && window.AndroidRadar.onRequestTimelineRefresh) {
                        window.AndroidRadar.onRequestTimelineRefresh();
                    } else {
                        fetchRainViewerTimelineDirectly();
                    }
                }, 400);

                map.on('click', function(e) {
                    var lat = e.latlng.lat;
                    var lon = e.latlng.lng;
                    lon = ((lon + 180) % 360 + 360) % 360 - 180;
                    updateSelectedMarker(lat, lon);
                    if (window.AndroidMap) {
                        window.AndroidMap.onCoordinatesSelected(lat, lon);
                    }
                });

            } catch (ex) {
                logErrorAndroid('Leaflet map initialization exception: ' + ex.message);
                showError('Crash Detected', 'Failed to compile or instantiate map engine: ' + ex.message);
            }
        }

        function updateBaseMap() {
            if (!map) return;
            if (baseTileLayer) {
                map.removeLayer(baseTileLayer);
            }

            var isMapTilerValid = (maptilerApiKey && 
                                  !maptilerApiKey.includes('PLACEholder') && 
                                  !maptilerApiKey.includes('placeholder') && 
                                  maptilerApiKey !== 'MY_MAPTILER_KEY' && 
                                  maptilerApiKey.trim() !== '');

            var tileUrl = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png";
            var tileOptions = {
                maxZoom: 20,
                tileSize: 256,
                crossOrigin: false,
                subdomains: 'abcd'
            };

            if (isMapTilerValid) {
                tileUrl = "https://api.maptiler.com/maps/darkmatter/256/{z}/{x}/{y}.png?key=" + maptilerApiKey;
                tileOptions.subdomains = [];
            }

            baseTileLayer = L.tileLayer(tileUrl, tileOptions).addTo(map);
            baseTileLayer.on('tileerror', function(e) {
                logErrorAndroid('Basemap tile failed to load URL: ' + (e.tile ? e.tile.src : 'unknown'));
            });
        }

        function setCenter(lat, lon, zoom) {
            if (!map) return;
            var currentZoom = zoom || map.getZoom();
            map.flyTo([lat, lon], currentZoom, { animate: true, duration: 1.5 });
            updateSelectedMarker(lat, lon);
        }

        function updateSelectedMarker(lat, lon) {
            if (!map) return;
            if (currentGpsMarker) {
                map.removeLayer(currentGpsMarker);
            }

            var customIcon = L.divIcon({
                className: 'custom-marker',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });

            currentGpsMarker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
        }

        function setWeatherApiKey(key) {
            weatherApiKey = key;
            if (mapLoaded && currentLayerType !== 'RAINFALL') {
                updateWeatherLayers();
            }
        }

        function setMapTilerApiKey(key) {
            var isKeyValid = (key && !key.includes('placeholder') && key.trim() !== '');
            if (isKeyValid && key !== maptilerApiKey) {
                maptilerApiKey = key;
                updateBaseMap();
            }
        }

        function setWeatherLayer(layerType) {
            currentLayerType = layerType;
            logAndroid('Switching weather overlay to: ' + layerType);
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        // Bridge function called by Kotlin RadarOverlayManager with JSON timeline payload
        function updateRadarTimeline(payload) {
            hideRadarUnavailable();
            logAndroid('Timeline downloaded');
            if (!payload || !payload.frames) {
                showRadarUnavailable('Radar temporarily unavailable');
                return;
            }

            rainViewerHost = payload.host || 'https://tilecache.rainviewer.com';
            radarFrames = payload.frames || [];

            logAndroid('Updated radar timeline with ' + radarFrames.length + ' frames.');
            preloadRadarTileLayers();
            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        // Direct API fetch fallback if running standalone in browser
        function fetchRainViewerTimelineDirectly() {
            showLoader(true, 'Downloading RainViewer Radar Timeline...');
            fetch('https://api.rainviewer.com/public/weather-maps.json')
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP Status ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    showLoader(false);
                    hideRadarUnavailable();
                    logAndroid('Timeline downloaded directly via API');
                    
                    if (data && data.radar && data.radar.past) {
                        rainViewerHost = data.host || 'https://tilecache.rainviewer.com';
                        var past = data.radar.past || [];
                        var nowcast = data.radar.nowcast || [];

                        var nowIndex = Math.max(0, past.length - 1);
                        var nowFrame = past[nowIndex] || { time: Date.now()/1000, path: '' };

                        var compiled = [
                            past[Math.max(0, nowIndex - 18)] || nowFrame,
                            past[Math.max(0, nowIndex - 12)] || nowFrame,
                            past[Math.max(0, nowIndex - 6)] || nowFrame,
                            nowFrame,
                            (nowcast.length > 5 ? nowcast[5] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 11 ? nowcast[11] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 17 ? nowcast[17] : (nowcast[0] || nowFrame))
                        ];

                        radarFrames = compiled.map(function(f) {
                            var cleanHost = rainViewerHost.replace(/\/$/, '');
                            var cleanPath = (f.path || '').replace(/\/$/, '');
                            return {
                                time: f.time,
                                path: f.path,
                                tileUrl: cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png'
                            };
                        });

                        preloadRadarTileLayers();
                        if (currentLayerType === 'RAINFALL') {
                            displayFrameAtIndex(activeTimelineIndex);
                        }
                    } else {
                        showRadarUnavailable('Radar temporarily unavailable');
                    }
                })
                .catch(function(err) {
                    showLoader(false);
                    logErrorAndroid('Direct RainViewer fetch failed: ' + err.message);
                    showRadarUnavailable('Radar temporarily unavailable');
                });
        }

        // Performance Optimization: Pre-instantiate and cache tile layers in radarTileLayers map
        function preloadRadarTileLayers() {
            if (!map) return;

            // Remove tile layers for timestamps no longer in radarFrames
            var activeTimestamps = radarFrames.map(function(f) { return f.time; });
            Object.keys(radarTileLayers).forEach(function(ts) {
                if (activeTimestamps.indexOf(Number(ts)) === -1) {
                    map.removeLayer(radarTileLayers[ts]);
                    delete radarTileLayers[ts];
                }
            });

            // Instantiate tile layers for each frame
            radarFrames.forEach(function(frame) {
                var ts = frame.time;
                if (!radarTileLayers[ts]) {
                    var tileUrlTemplate = frame.tileUrl || (rainViewerHost.replace(/\/$/, '') + frame.path.replace(/\/$/, '') + '/256/{z}/{x}/{y}/2/1_1.png');
                    
                    var layer = L.tileLayer(tileUrlTemplate, {
                        opacity: 0, // initially hidden
                        maxZoom: 18,
                        tileSize: 256,
                        crossOrigin: false // Prevents ORB cross-origin issues in WebView
                    }).addTo(map);

                    // Add robust error handling & retries
                    layer.on('tileerror', function(e) {
                        var tileUrl = e.tile ? e.tile.src : 'unknown';
                        var retryCount = (e.tile._retryCount || 0) + 1;
                        e.tile._retryCount = retryCount;

                        logErrorAndroid('Tile load failed: ' + tileUrl + ' (Attempt ' + retryCount + ')');
                        if (window.AndroidRadar) {
                            window.AndroidRadar.onTileError(tileUrl, retryCount);
                        }

                        if (retryCount <= 3) {
                            var delayMs = retryCount * 1000;
                            logAndroid('Retrying... tile download in ' + delayMs + 'ms');
                            if (window.AndroidRadar) {
                                window.AndroidRadar.onRetryingTile(tileUrl, delayMs);
                            }
                            setTimeout(function() {
                                if (e.tile) {
                                    var cleanUrl = tileUrl.split('?')[0];
                                    e.tile.src = cleanUrl + '?retry=' + Date.now();
                                }
                            }, delayMs);
                        }
                    });

                    layer.on('tileload', function(e) {
                        var tileUrl = e.tile ? e.tile.src : 'unknown';
                        logAndroid('Tile loaded successfully: ' + tileUrl);
                        if (window.AndroidRadar) {
                            window.AndroidRadar.onTileLoaded(tileUrl);
                        }
                    });

                    radarTileLayers[ts] = layer;
                }
            });
        }

        function setTimelineIndex(index) {
            activeTimelineIndex = Math.max(0, Math.min(6, index));
            logAndroid('Current frame selected at timeline index: ' + activeTimelineIndex);
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        function displayFrameAtIndex(index) {
            if (!map || radarFrames.length === 0) return;

            var targetFrame = radarFrames[index];
            if (!targetFrame) {
                logErrorAndroid('No radar frame available at timeline index: ' + index);
                return;
            }

            var targetTime = targetFrame.time;
            var tileUrlTemplate = targetFrame.tileUrl || (rainViewerHost.replace(/\/$/, '') + targetFrame.path.replace(/\/$/, '') + '/256/{z}/{x}/{y}/2/1_1.png');
            logAndroid('Current frame selected: timestamp ' + targetTime + ' at index ' + index);
            logAndroid('Tile URL generated: ' + tileUrlTemplate);

            // Hide all other radar tile layers and bring selected layer to 0.85 opacity
            Object.keys(radarTileLayers).forEach(function(ts) {
                var layer = radarTileLayers[ts];
                if (Number(ts) === Number(targetTime)) {
                    layer.setOpacity(0.85);
                    layer.bringToFront();
                } else {
                    layer.setOpacity(0);
                }
            });
        }

        function showLoader(visible, text) {
            var loader = document.getElementById('loader');
            if (text) loader.innerText = text;
            loader.style.display = visible ? 'block' : 'none';
        }

        function updateWeatherLayers() {
            if (!map) return;
            hideRadarUnavailable();

            if (nonRadarWeatherTileLayer) {
                map.removeLayer(nonRadarWeatherTileLayer);
                nonRadarWeatherTileLayer = null;
            }

            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            } else {
                // Hide all radar tile layers when viewing non-rainfall layers
                Object.keys(radarTileLayers).forEach(function(ts) {
                    radarTileLayers[ts].setOpacity(0);
                });

                var isApiKeyValid = (weatherApiKey && 
                                     !weatherApiKey.includes('PLACEholder') && 
                                     !weatherApiKey.includes('placeholder') && 
                                     weatherApiKey !== 'MY_WEATHER_KEY' && 
                                     weatherApiKey.trim() !== '');

                var layerCode = '';
                switch (currentLayerType) {
                    case 'CLOUD_COVER': layerCode = 'clouds_new'; break;
                    case 'TEMPERATURE': layerCode = 'temp_new'; break;
                    case 'WIND_SPEED': layerCode = 'wind_new'; break;
                    case 'PRESSURE': layerCode = 'pressure_new'; break;
                    case 'HUMIDITY': layerCode = 'precipitation_new'; break;
                }

                if (isApiKeyValid) {
                    showLoader(true, 'Fetching OpenWeatherMap Overlay...');
                    var owmUrl = 'https://tile.openweathermap.org/map/' + layerCode + '/{z}/{x}/{y}.png?appid=' + weatherApiKey;
                    
                    nonRadarWeatherTileLayer = L.tileLayer(owmUrl, {
                        opacity: 0.75,
                        maxZoom: 18,
                        tileSize: 256,
                        crossOrigin: false
                    }).addTo(map);

                    nonRadarWeatherTileLayer.on('load', function() { showLoader(false); });
                    setTimeout(function() { showLoader(false); }, 1500);
                } else {
                    showRadarUnavailable(currentLayerType + ' Satellite Overlay: Active OpenWeatherMap API key required.');
                    drawAestheticFallbacks();
                }
            }
        }

        var fallbackLayerGroup = null;
        function drawAestheticFallbacks() {
            if (!map) return;
            if (fallbackLayerGroup) {
                map.removeLayer(fallbackLayerGroup);
            }
            fallbackLayerGroup = L.layerGroup().addTo(map);

            if (currentLayerType === 'TEMPERATURE') {
                L.circle([30, -40], { color: 'transparent', fillColor: '#FF5722', fillOpacity: 0.25, radius: 2500000 }).addTo(fallbackLayerGroup);
                L.circle([10, 15], { color: 'transparent', fillColor: '#FF9800', fillOpacity: 0.2, radius: 3000000 }).addTo(fallbackLayerGroup);
            } else if (currentLayerType === 'CLOUD_COVER') {
                L.circle([15, -100], { color: 'transparent', fillColor: '#FFFFFF', fillOpacity: 0.2, radius: 2500000 }).addTo(fallbackLayerGroup);
            } else {
                L.circle([20, 20], { color: 'transparent', fillColor: '#00E5FF', fillOpacity: 0.15, radius: 2800000 }).addTo(fallbackLayerGroup);
            }

            nonRadarWeatherTileLayer = fallbackLayerGroup;
        }

        function safeInit() {
            var attempts = 0;
            function check() {
                if (typeof L !== 'undefined') {
                    initializeMapEngine();
                } else {
                    attempts++;
                    if (attempts < 50) {
                        setTimeout(check, 100);
                    } else {
                        showError('Script Load Failure', 'Failed to resolve Leaflet mapping library (L). Please check network connection.');
                    }
                }
            }
            check();
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            safeInit();
        } else {
            window.addEventListener('DOMContentLoaded', safeInit);
        }
    </script>
</body>
</html>
