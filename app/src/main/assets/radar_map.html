<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SkySphere Real-Time Weather Radar</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <!-- Include MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background-color: #070913; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
        
        /* Remove default MapLibre controls and overlays for a clean mobile-first UI */
        .maplibregl-ctrl { display: none !important; }
        .maplibregl-ctrl-attrib { display: none !important; }
        .maplibregl-ctrl-logo { display: none !important; }

        /* Premium glowing loading spinner */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.85);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid rgba(0, 229, 255, 0.35);
            font-size: 14px;
            font-weight: 700;
            color: #00E5FF;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Ambient warning toast */
        #api-warning {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 12px;
            color: #F87171;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.85; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
            50% { opacity: 1; box-shadow: 0 10px 35px rgba(0, 229, 255, 0.2); }
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loader">Fetching Doppler Radar...</div>
    <div id="api-warning"></div>

    <!-- Error/Fallback visual overlay -->
    <div id="error-overlay" style="position: absolute; top: 0; bottom: 0; left: 0; right: 0; background-color: #070913; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 24px; z-index: 2000; font-family: sans-serif;">
        <div style="font-size: 54px; margin-bottom: 20px;">🌐</div>
        <div style="font-size: 20px; font-weight: bold; color: #FF5252; margin-bottom: 12px;" id="error-title">Map Interface Unreachable</div>
        <div style="font-size: 14px; color: #A0AEC0; max-width: 300px; line-height: 1.6; margin-bottom: 24px;" id="error-desc">Initializing map telemetry engine...</div>
        <button onclick="window.location.reload();" style="background: rgba(0, 229, 255, 0.15); border: 1px solid #00E5FF; color: #00E5FF; padding: 10px 24px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Reload Map</button>
    </div>

    <script>
        // High-reliability global error boundary logger
        window.onerror = function(message, source, lineno, colno, error) {
            var errStr = message + ' at ' + (source || 'unknown') + ':' + lineno;
            console.error('JS Uncaught Error Boundary: ' + errStr);
            return false;
        };

        // Passive scroll listeners to boost mobile FPS
        document.addEventListener('touchstart', function() {}, {passive: true});
        document.addEventListener('touchmove', function() {}, {passive: true});

        var currentGpsMarker = null;
        var mapLoaded = false;
        var currentLayerType = 'RAINFALL';
        var weatherApiKey = '';
        var maptilerApiKey = '';
        var selectedCoordinates = null;
        var map = null;

        // Custom Error UI Handler
        function showError(title, desc) {
            console.error('Displaying Map Error Overlay: ' + title + ' - ' + desc);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = desc;
            document.getElementById('error-overlay').style.display = 'flex';
        }

        // WebGL Presence detector
        function isWebGLSupported() {
            try {
                var canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
            } catch (e) {
                console.error('WebGL check exception:', e);
                return false;
            }
        }

        if (!isWebGLSupported()) {
            showError('WebGL Unsupported', 'Your mobile device does not support WebGL or hardware acceleration. Please check your developer settings.');
        } else {
            initializeMapEngine();
        }

        function initializeMapEngine() {
            try {
                // Limit pixel ratio to max 2.0 to avoid heavy GPU shading on low-end hardware
                var maxPixelRatio = Math.min(window.devicePixelRatio || 1, 2.0);

                // ULTRA-RELIABLE BULLETPROOF BASEMAP TECHNIQUE:
                // Define local inline raster basemap style object using globally-free CartoDB Dark Matter tiles.
                // This has 0 external network round-trips for 'style.json', avoiding local CORS / file:/// restrictions.
                var localCartoStyle = {
                    "version": 8,
                    "sources": {
                        "carto-dark": {
                            "type": "raster",
                            "tiles": [
                                "https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
                                "https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
                                "https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
                                "https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png"
                            ],
                            "tileSize": 256,
                            "attribution": "© OpenStreetMap contributors, © CARTO"
                        }
                    },
                    "layers": [
                        {
                            "id": "carto-dark-layer",
                            "type": "raster",
                            "source": "carto-dark",
                            "minzoom": 0,
                            "maxzoom": 20
                        }
                    ]
                };

                console.log('Initializing MapLibre engine with high-reliability local style');
                map = new maplibregl.Map({
                    container: 'map',
                    style: localCartoStyle,
                    center: [0, 20],
                    zoom: 2.2,
                    minZoom: 1,
                    maxZoom: 16,
                    attributionControl: false,
                    antialias: true,
                    pixelRatio: maxPixelRatio
                });

                // Fail-safe load timeout check
                setTimeout(function() {
                    if (!mapLoaded) {
                        console.warn('MapLibre load event timed out. Ensuring UI displays properly.');
                        // If we are still not loaded, trigger manual load callback to allow fallback overlays
                        mapLoaded = true;
                        setupVisualFallbackLayers();
                        if (window.AndroidMap) {
                            window.AndroidMap.onMapLoaded();
                        }
                        updateWeatherLayers();
                    }
                }, 8000);

                map.on('load', function() {
                    console.log('MapLibre engine loaded successfully');
                    mapLoaded = true;
                    setupVisualFallbackLayers();

                    if (window.AndroidMap) {
                        window.AndroidMap.onMapLoaded();
                    }
                    updateWeatherLayers();
                });

                map.on('error', function(e) {
                    console.error('MapLibre core engine error event:', e);
                });

                // Map Click Listener
                map.on('click', function(e) {
                    var lat = e.lngLat.lat;
                    var lon = e.lngLat.wrap().lng;
                    selectedCoordinates = { lat: lat, lon: lon };
                    updateSelectedMarker(lat, lon);
                    if (window.AndroidMap) {
                        window.AndroidMap.onCoordinatesSelected(lat, lon);
                    }
                });

            } catch (ex) {
                console.error('MapLibre creation threw exception:', ex);
                showError('Crash Detected', 'Failed to compile or instantiate map engine: ' + ex.message);
            }
        }

        function updateSelectedMarker(lat, lon) {
            if (!map) return;
            if (currentGpsMarker) {
                currentGpsMarker.remove();
            }
            
            var el = document.createElement('div');
            el.className = 'custom-marker';
            el.style.width = '18px';
            el.style.height = '18px';
            el.style.borderRadius = '50%';
            el.style.backgroundColor = '#00E5FF';
            el.style.border = '3px solid #FFFFFF';
            el.style.boxShadow = '0 0 12px #00E5FF';
            el.style.animation = 'pulse 1.5s infinite';

            // Pulse animation style declaration
            var style = document.createElement('style');
            style.innerHTML = `
                @keyframes pulse {
                    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
                    70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
                    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
                }
            `;
            document.head.appendChild(style);

            currentGpsMarker = new maplibregl.Marker({ element: el })
                .setLngLat([lon, lat])
                .addTo(map);
        }

        // Bridge function: Centering Map
        function setCenter(lat, lon, zoom) {
            if (!map) return;
            map.flyTo({
                center: [lon, lat],
                zoom: zoom || map.getZoom(),
                essential: true,
                speed: 1.5,
                curve: 1.1
            });
            updateSelectedMarker(lat, lon);
        }

        // Bridge function: Sync Weather API key
        function setWeatherApiKey(key) {
            weatherApiKey = key;
            console.log('Syncing Weather API Key to map: ' + (key ? 'PRESENT (len: ' + key.length + ')' : 'ABSENT'));
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        // Bridge function: Sync MapTiler API Key (Premium High Performance Base Map Upgrade)
        function setMapTilerApiKey(key) {
            var isKeyValid = (key && 
                              !key.includes('PLACEholder') && 
                              !key.includes('placeholder') && 
                              key !== 'MY_MAPTILER_KEY' && 
                              key.trim() !== '');
            console.log('Syncing MapTiler Key: ' + (isKeyValid ? 'VALID' : 'INVALID/ABSENT'));
            if (isKeyValid && key !== maptilerApiKey) {
                maptilerApiKey = key;
                if (map) {
                    console.log('Upgrading style to MapTiler premium Dark Matter style');
                    map.setStyle('https://api.maptiler.com/maps/darkmatter/style.json?key=' + maptilerApiKey);
                }
            }
        }

        // Bridge function: Switch layers
        function setWeatherLayer(layerType) {
            currentLayerType = layerType;
            console.log('Switching weather overlay to: ' + layerType);
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        // Auto-refresh layers automatically every 5 minutes
        setInterval(function() {
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }, 300000);

        // Show/hide custom loader
        function showLoader(visible, text) {
            var loader = document.getElementById('loader');
            if (text) loader.innerText = text;
            loader.style.display = visible ? 'block' : 'none';
        }

        // Setup gorgeous static canvas fallbacks for premium look-and-feel if keys are missing
        function setupVisualFallbackLayers() {
            if (!map) return;
            try {
                // Ensure unique source
                if (map.getSource('fallback-temperature')) return;

                map.addSource('fallback-temperature', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: [
                            { type: 'Feature', properties: { temp: 35 }, geometry: { type: 'Point', coordinates: [0, 0] } },
                            { type: 'Feature', properties: { temp: 28 }, geometry: { type: 'Point', coordinates: [12, 41] } },
                            { type: 'Feature', properties: { temp: 22 }, geometry: { type: 'Point', coordinates: [-74, 40] } },
                            { type: 'Feature', properties: { temp: 30 }, geometry: { type: 'Point', coordinates: [77, 19] } },
                            { type: 'Feature', properties: { temp: 15 }, geometry: { type: 'Point', coordinates: [37, 55] } },
                            { type: 'Feature', properties: { temp: 5 }, geometry: { type: 'Point', coordinates: [-21, 64] } },
                            { type: 'Feature', properties: { temp: 32 }, geometry: { type: 'Point', coordinates: [55, 25] } }
                        ]
                    }
                });

                map.addLayer({
                    id: 'fallback-temperature-layer',
                    type: 'heatmap',
                    source: 'fallback-temperature',
                    maxzoom: 9,
                    paint: {
                        'heatmap-weight': {
                            type: 'exponential',
                            properties: 'temp',
                            stops: [[0, 0], [40, 1.2]]
                        },
                        'heatmap-intensity': 1.5,
                        'heatmap-color': [
                            'interpolate',
                            ['linear'],
                            ['heatmap-density'],
                            0, 'rgba(0, 229, 255, 0)',
                            0.3, 'rgba(33, 150, 243, 0.15)',
                            0.6, 'rgba(255, 112, 67, 0.25)',
                            0.9, 'rgba(244, 67, 54, 0.35)'
                        ],
                        'heatmap-radius': 180,
                        'heatmap-opacity': 0
                    }
                });
            } catch (err) {
                console.error('Error in setupVisualFallbackLayers:', err);
            }
        }

        // Core weather overlay rendering manager
        function updateWeatherLayers() {
            if (!map) return;
            var warningEl = document.getElementById('api-warning');
            warningEl.style.display = 'none';

            // Reset fallbacks and live sources safely
            try {
                if (map.getLayer('rain-radar')) { map.removeLayer('rain-radar'); }
                if (map.getSource('rain-radar')) { map.removeSource('rain-radar'); }
                if (map.getLayer('owm-layer')) { map.removeLayer('owm-layer'); }
                if (map.getSource('owm-layer')) { map.removeSource('owm-layer'); }
            } catch (e) {
                console.error('Cleaning up layers threw exception:', e);
            }
            
            // Set fallback opacity to 0
            if (map.getLayer('fallback-temperature-layer')) {
                map.setPaintProperty('fallback-temperature-layer', 'heatmap-opacity', 0);
            }

            var isApiKeyValid = (weatherApiKey && 
                                 !weatherApiKey.includes('PLACEholder') && 
                                 !weatherApiKey.includes('placeholder') && 
                                 weatherApiKey !== 'MY_WEATHER_KEY' && 
                                 weatherApiKey.trim() !== '');

            if (currentLayerType === 'RAINFALL') {
                // RainViewer radar map: Completely FREE and REAL live active radar telemetry data!
                showLoader(true, 'Connecting to RainViewer Live Doppler Radar...');
                fetch('https://api.rainviewer.com/public/weather-maps.json')
                    .then(response => {
                        if (!response.ok) throw new Error('HTTP Status ' + response.status);
                        return response.json();
                    })
                    .then(data => {
                        showLoader(false);
                        if (data && data.radar && data.radar.past && data.radar.past.length > 0) {
                            var latest = data.radar.past[data.radar.past.length - 1];
                            var radarTileUrl = 'https://tilecache.rainviewer.com/v2/radar/' + latest.time + '/256/{z}/{x}/{y}/2/1_1.png';

                            console.log('Loading live RainViewer radar overlay with timestamp ' + latest.time);
                            map.addSource('rain-radar', {
                                type: 'raster',
                                tiles: [radarTileUrl],
                                tileSize: 256
                            });
                            map.addLayer({
                                id: 'rain-radar',
                                type: 'raster',
                                source: 'rain-radar',
                                paint: {
                                    'raster-opacity': 0.8
                                }
                            });
                        } else {
                            console.warn('RainViewer response contained empty or invalid radar data');
                        }
                    })
                    .catch(err => {
                        showLoader(false);
                        console.error('RainViewer active radar sync failed:', err);
                        warningEl.innerHTML = `<strong>Radar Connection Issue:</strong> Unable to load live RainViewer Doppler radar tiles. Please verify network connection.`;
                        warningEl.style.display = 'block';
                    });
            } else {
                // OpenWeatherMap Real Overlays
                var layerCode = '';
                switch (currentLayerType) {
                    case 'CLOUD_COVER': layerCode = 'clouds_new'; break;
                    case 'TEMPERATURE': layerCode = 'temp_new'; break;
                    case 'WIND_SPEED':
                    case 'WIND_DIRECTION': layerCode = 'wind_new'; break;
                    case 'PRESSURE': layerCode = 'pressure_new'; break;
                    case 'HUMIDITY': layerCode = 'precipitation_new'; break;
                }

                if (isApiKeyValid) {
                    showLoader(true, 'Fetching OpenWeatherMap Overlay...');
                    var owmUrl = 'https://tile.openweathermap.org/map/' + layerCode + '/{z}/{x}/{y}.png?appid=' + weatherApiKey;
                    console.log('Loading OpenWeatherMap ' + currentLayerType + ' layer with OWM API Key');
                    
                    map.addSource('owm-layer', {
                        type: 'raster',
                        tiles: [owmUrl],
                        tileSize: 256
                    });
                    map.addLayer({
                        id: 'owm-layer',
                        type: 'raster',
                        source: 'owm-layer',
                        paint: {
                            'raster-opacity': 0.7
                        }
                    });
                    
                    // Add listener to dismiss loader once tiles load
                    map.once('render', function() {
                        showLoader(false);
                    });
                    setTimeout(function() { showLoader(false); }, 1500); // safety fallback
                } else {
                    console.warn('Weather API Key missing. Activating aesthetic fallbacks.');
                    // Display premium aesthetic fallback and warning toast
                    if (currentLayerType === 'TEMPERATURE' && map.getLayer('fallback-temperature-layer')) {
                        map.setPaintProperty('fallback-temperature-layer', 'heatmap-opacity', 0.8);
                    }
                    
                    warningEl.innerHTML = `<strong>${currentLayerType} Satellite Overlay:</strong> Real-time weather satellite tiles require an active OpenWeatherMap API key. Configure it in the AI Studio Secrets panel.`;
                    warningEl.style.display = 'block';

                    if (window.AndroidMap) {
                        window.AndroidMap.onApiKeyMissing(currentLayerType);
                    }
                }
            }
        }
    </script>
</body>
</html>
