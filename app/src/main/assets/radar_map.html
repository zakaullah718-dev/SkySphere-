<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SkySphere Weather Radar</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width,height=device-height" />
    <link rel="stylesheet" href="leaflet.css" onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';" />
    <script src="leaflet.js" onerror="this.onerror=null;this.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #070913;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1120;
            z-index: 1;
        }
        .leaflet-container {
            background-color: #0b1120 !important;
        }

        /* Loading indicator toast */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.92);
            padding: 14px 24px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.4);
            font-size: 13px;
            font-weight: 700;
            color: #00E5FF;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            pointer-events: none;
        }

        /* Status & Error warning banner */
        #status-banner {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: rgba(30, 41, 59, 0.94);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #38BDF8;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            pointer-events: none;
        }

        /* Pulsing GPS Location Marker */
        .gps-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00E5FF;
            border: 3px solid #FFFFFF;
            box-shadow: 0 0 16px #00E5FF;
            animation: gps-pulse 1.6s infinite ease-out;
            cursor: pointer;
        }

        @keyframes gps-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.8); }
            70% { box-shadow: 0 0 0 16px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        /* Radar Intensity Bar Legend (Matching Screenshot 4) */
        #radar-legend {
            position: absolute;
            left: 12px;
            top: 40%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            padding: 8px 5px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .legend-bar {
            width: 10px;
            height: 200px;
            border-radius: 5px;
            background: linear-gradient(to top, 
                #00E5FF 0%, 
                #2196F3 15%, 
                #1565C0 30%, 
                #4CAF50 45%, 
                #2E7D32 60%, 
                #FFEB3B 75%, 
                #FF9800 85%, 
                #F44336 93%, 
                #880E4F 100%);
        }
        .legend-info-btn {
            margin-top: 8px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid #0284C7;
            color: #0284C7;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loader">Initializing SkySphere Radar Engine...</div>
    <div id="status-banner">Connecting to Weather Servers...</div>

    <div id="radar-legend">
        <div class="legend-bar"></div>
        <div class="legend-info-btn">i</div>
    </div>

    <script>
        // Global Leaflet State
        var map = null;
        var mapLoaded = false;
        var baseTileLayer = null;
        var mapTilerApiKey = '';
        var openWeatherApiKey = '';
        var currentGpsMarker = null;

        // Radar State
        var currentLayerType = 'RAINFALL';
        var radarOpacity = 0.85;
        var activeFrameIndex = 3;
        var rainViewerHost = 'https://tilecache.rainviewer.com';
        var radarFrames = [];
        var radarLayers = [];
        var owmTileLayer = null;
        var isPlaying = false;
        var animationTimer = null;

        // Log helper
        function logDebug(msg) {
            console.log('SkySphere JS: ' + msg);
            if (window.AndroidMap && window.AndroidMap.logDebug) {
                window.AndroidMap.logDebug(msg);
            }
        }

        function logError(msg) {
            console.error('SkySphere JS ERROR: ' + msg);
            if (window.AndroidMap && window.AndroidMap.logError) {
                window.AndroidMap.logError(msg);
            }
        }

        function showLoader(show, message) {
            var el = document.getElementById('loader');
            if (!el) return;
            if (show) {
                el.innerText = message || 'Loading Weather Radar...';
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        }

        function showStatusBanner(message, isError) {
            var banner = document.getElementById('status-banner');
            if (!banner) return;
            banner.innerText = message;
            banner.style.color = isError ? '#FF5252' : '#38BDF8';
            banner.style.borderColor = isError ? 'rgba(255, 82, 82, 0.5)' : 'rgba(0, 229, 255, 0.4)';
            banner.style.display = 'block';
        }

        function hideStatusBanner() {
            var banner = document.getElementById('status-banner');
            if (banner) banner.style.display = 'none';
        }

        function invalidateMapSize() {
            if (map) {
                map.invalidateSize();
            }
        }

        var currentMapStyle = 'LIGHT';

        function setMapStyle(style) {
            currentMapStyle = (style || 'LIGHT').toUpperCase();
            logDebug('[MapTiles] setMapStyle called: ' + currentMapStyle);
            if (mapLoaded) {
                loadMapTiles();
            }
        }

        // --- Step 3 & 4: MapTiler & Fallback Map Tiles ---
        function loadMapTiles() {
            if (!map) return;
            if (baseTileLayer) {
                map.removeLayer(baseTileLayer);
                baseTileLayer = null;
            }

            var isValidMapTilerKey = mapTilerApiKey && 
                !mapTilerApiKey.includes('PLACEholder') && 
                !mapTilerApiKey.includes('placeholder') && 
                mapTilerApiKey !== 'MY_MAPTILER_KEY' && 
                mapTilerApiKey.trim() !== '';

            var tileUrl = '';
            var attribution = '&copy; CartoDB &copy; OpenStreetMap';

            if (currentMapStyle === 'DARK') {
                tileUrl = 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png';
            } else if (currentMapStyle === 'HYBRID') {
                tileUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
                attribution = '&copy; Esri &copy; OpenStreetMap';
            } else if (currentMapStyle === 'SYSTEM') {
                var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                tileUrl = isDark ? 
                    'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png' : 
                    'https://{s}.basemaps.cartocdn.com/rastertiles/light_all/{z}/{x}/{y}.png';
            } else { // LIGHT style (matching Screenshots 3 & 4)
                if (isValidMapTilerKey) {
                    tileUrl = 'https://api.maptiler.com/maps/dataviz-light/{z}/{x}/{y}.png?key=' + mapTilerApiKey;
                    attribution = '&copy; MapTiler &copy; OpenStreetMap';
                } else {
                    tileUrl = 'https://{s}.basemaps.cartocdn.com/rastertiles/light_all/{z}/{x}/{y}.png';
                }
            }

            baseTileLayer = L.tileLayer(tileUrl, {
                subdomains: ['a', 'b', 'c', 'd'],
                maxZoom: 19,
                minZoom: 0,
                tileSize: 256,
                attribution: attribution
            });

            baseTileLayer.on('tileload', function() {
                hideStatusBanner();
            });

            baseTileLayer.on('tileerror', function(err) {
                logError('[TileLoadError] Tile request failed: ' + (err.tile ? err.tile.src : 'unknown'));
                showStatusBanner('Unable to load map tiles.', false);
            });

            baseTileLayer.addTo(map);
            logDebug('[MapTiles] Map tile layer added to Leaflet canvas with style: ' + currentMapStyle);
        }

        function setMapTilerKey(key) {
            mapTilerApiKey = key || '';
            logDebug('[MapTiles] setMapTilerKey called: ' + (key ? key.substring(0, 6) + '...' : 'empty'));
            if (mapLoaded) {
                loadMapTiles();
            }
        }

        function setWeatherApiKey(key) {
            openWeatherApiKey = key || '';
            logDebug('[WeatherKey] OpenWeather API Key received.');
            if (mapLoaded && currentLayerType !== 'RAINFALL') {
                updateWeatherLayers();
            }
        }

        // --- Step 2 & 3: Initialize Leaflet Engine ---
        function initializeLeafletMap() {
            if (map) return;
            try {
                logDebug('[LeafletInit] Starting Leaflet map engine initialization...');
                showLoader(true, 'Initializing SkySphere Radar Canvas...');

                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false,
                    fadeAnimation: false,
                    zoomAnimation: true,
                    minZoom: 1,
                    maxZoom: 18
                }).setView([20, 0], 3);

                logDebug('[LeafletInit] Leaflet L.map created successfully!');

                loadMapTiles();

                // Click listener for coordinate selection
                map.on('click', function(e) {
                    var lat = e.latlng.lat;
                    var lon = e.latlng.lng;
                    lon = ((lon + 180) % 360 + 360) % 360 - 180;
                    logDebug('[MapClick] Clicked lat=' + lat.toFixed(4) + ', lon=' + lon.toFixed(4));
                    updateSelectedMarker(lat, lon);
                    if (window.AndroidMap && window.AndroidMap.onCoordinatesSelected) {
                        window.AndroidMap.onCoordinatesSelected(lat, lon);
                    }
                });

                mapLoaded = true;
                logDebug('[LeafletInit] Leaflet engine full initialization completed!');
                showLoader(false);

                invalidateMapSize();
                setTimeout(function() { invalidateMapSize(); }, 100);
                setTimeout(function() { invalidateMapSize(); }, 300);

                if (window.AndroidMap && window.AndroidMap.onMapLoaded) {
                    logDebug('[NativeBridge] Calling AndroidMap.onMapLoaded()');
                    window.AndroidMap.onMapLoaded();
                }

                if (window.AndroidMap && window.AndroidMap.onRequestTimelineRefresh) {
                    window.AndroidMap.onRequestTimelineRefresh();
                } else {
                    fetchRainViewerTimelineDirectly();
                }

            } catch (err) {
                logError('[LeafletInitFailed] Exception during Leaflet initialization: ' + err.message);
                showStatusBanner('Map initialization error: ' + err.message, true);
            }
        }

        // --- Step 6: GPS & Location Pin ---
        function setCenter(lat, lon, zoom) {
            if (!map) return;
            var targetZoom = zoom || map.getZoom() || 6;
            logDebug('[GPS] Flying to lat=' + lat + ', lon=' + lon + ', zoom=' + targetZoom);
            map.flyTo([lat, lon], targetZoom, { duration: 0.8 });
            updateSelectedMarker(lat, lon);
            invalidateMapSize();
        }

        function zoomIn() {
            if (map) map.zoomIn();
        }

        function zoomOut() {
            if (map) map.zoomOut();
        }

        function resetNorth() {
            if (map && currentGpsMarker) {
                map.panTo(currentGpsMarker.getLatLng());
            }
        }

        function updateSelectedMarker(lat, lon) {
            if (!map) return;
            if (currentGpsMarker) {
                map.removeLayer(currentGpsMarker);
            }
            var customIcon = L.divIcon({
                className: 'gps-marker',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });
            currentGpsMarker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
            logDebug('[GPS] Location marker updated on Leaflet map.');
        }

        // --- Step 5: RainViewer Doppler Radar Overlay & Timeline ---
        function updateRadarTimeline(payload) {
            hideStatusBanner();
            logDebug('[RadarLoad] updateRadarTimeline called with payload data');
            var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
            if (!data || !data.frames || data.frames.length === 0) {
                logError('[RadarError] Empty radar timeline payload');
                showStatusBanner('Radar temporarily unavailable', true);
                return;
            }

            rainViewerHost = data.host || 'https://tilecache.rainviewer.com';
            radarFrames = data.frames || [];

            setupRadarTileLayers();
            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeFrameIndex);
            }
        }

        function fetchRainViewerTimelineDirectly() {
            showLoader(true, 'Fetching RainViewer Doppler Radar Timeline...');
            logDebug('[RadarLoad] Requesting https://api.rainviewer.com/public/weather-maps.json...');
            
            fetch('https://api.rainviewer.com/public/weather-maps.json')
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP Status ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    showLoader(false);
                    hideStatusBanner();
                    logDebug('[RadarLoad] RainViewer timeline API response received successfully!');
                    if (data && data.radar && data.radar.past) {
                        rainViewerHost = data.host || 'https://tilecache.rainviewer.com';
                        var past = data.radar.past || [];
                        var nowcast = data.radar.nowcast || [];

                        var nowIndex = Math.max(0, past.length - 1);
                        var nowFrame = past[nowIndex] || { time: Math.floor(Date.now()/1000), path: '' };

                        var compiled = [
                            past[Math.max(0, nowIndex - 18)] || nowFrame,
                            past[Math.max(0, nowIndex - 12)] || nowFrame,
                            past[Math.max(0, nowIndex - 6)] || nowFrame,
                            nowFrame,
                            (nowcast.length > 5 ? nowcast[5] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 11 ? nowcast[11] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 17 ? nowcast[17] : (nowcast[0] || nowFrame))
                        ];

                        radarFrames = compiled.map(function(f) {
                            var cleanHost = rainViewerHost.replace(/\/$/, '');
                            var cleanPath = (f.path || '').replace(/\/$/, '');
                            return {
                                time: f.time,
                                path: f.path,
                                tileUrl: cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png'
                            };
                        });

                        setupRadarTileLayers();
                        if (currentLayerType === 'RAINFALL') {
                            displayFrameAtIndex(activeFrameIndex);
                        }
                    } else {
                        showStatusBanner('Radar temporarily unavailable', true);
                    }
                })
                .catch(function(err) {
                    showLoader(false);
                    logError('[RadarError] Failed to fetch RainViewer radar: ' + err.message);
                    showStatusBanner('Radar temporarily unavailable (Offline)', false);
                });
        }

        function setupRadarTileLayers() {
            if (!map) return;

            radarLayers.forEach(function(item) {
                if (item && item.layer) {
                    map.removeLayer(item.layer);
                }
            });
            radarLayers = [];

            radarFrames.forEach(function(frame, idx) {
                var cleanHost = rainViewerHost.replace(/\/$/, '');
                var cleanPath = (frame.path || '').replace(/\/$/, '');
                var tileUrl = frame.tileUrl || (cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png');

                var layer = L.tileLayer(tileUrl, {
                    tileSize: 256,
                    opacity: 0,
                    maxZoom: 18,
                    minZoom: 0,
                    zIndex: 10 + idx
                }).addTo(map);

                radarLayers.push({
                    time: frame.time,
                    layer: layer
                });
            });

            logDebug('[RadarLoad] Configured ' + radarLayers.length + ' radar frame tile layers.');
        }

        function setTimelineIndex(index) {
            activeFrameIndex = Math.max(0, Math.min(6, index));
            logDebug('[Timeline] Timeline index set to: ' + activeFrameIndex);
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeFrameIndex);
            }
        }

        function displayFrameAtIndex(index) {
            if (!map || radarLayers.length === 0) return;

            var boundedIndex = Math.max(0, Math.min(radarLayers.length - 1, index));

            radarLayers.forEach(function(item, idx) {
                if (idx === boundedIndex) {
                    item.layer.setOpacity(radarOpacity);
                } else {
                    item.layer.setOpacity(0);
                }
            });

            if (window.AndroidMap && window.AndroidMap.onFrameChanged) {
                window.AndroidMap.onFrameChanged(boundedIndex);
            }
        }

        function setRadarOpacity(opacity) {
            radarOpacity = opacity;
            logDebug('[RadarOpacity] Opacity updated to: ' + opacity);
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeFrameIndex);
            }
        }

        // --- Radar Playback Controls ---
        function playAnimation() {
            if (isPlaying) return;
            isPlaying = true;
            logDebug('[AnimState] Radar animation PLAY started.');
            if (window.AndroidMap && window.AndroidMap.onPlaybackStateChanged) {
                window.AndroidMap.onPlaybackStateChanged(true);
            }
            
            animationTimer = setInterval(function() {
                activeFrameIndex = (activeFrameIndex + 1) % Math.max(1, radarLayers.length);
                displayFrameAtIndex(activeFrameIndex);
            }, 600);
        }

        function pauseAnimation() {
            if (!isPlaying) return;
            isPlaying = false;
            logDebug('[AnimState] Radar animation PAUSED.');
            if (animationTimer) {
                clearInterval(animationTimer);
                animationTimer = null;
            }
            if (window.AndroidMap && window.AndroidMap.onPlaybackStateChanged) {
                window.AndroidMap.onPlaybackStateChanged(false);
            }
        }

        function togglePlayback() {
            if (isPlaying) {
                pauseAnimation();
            } else {
                playAnimation();
            }
        }

        function setWeatherLayer(layerType) {
            currentLayerType = layerType;
            logDebug('[WeatherLayer] Switched layer mode to: ' + layerType);
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        function updateWeatherLayers() {
            if (!map) return;
            hideStatusBanner();

            if (owmTileLayer) {
                map.removeLayer(owmTileLayer);
                owmTileLayer = null;
            }

            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeFrameIndex);
            } else {
                radarLayers.forEach(function(item) {
                    item.layer.setOpacity(0);
                });

                var isApiKeyValid = (openWeatherApiKey && 
                                     !openWeatherApiKey.includes('PLACEholder') && 
                                     !openWeatherApiKey.includes('placeholder') && 
                                     openWeatherApiKey !== 'MY_WEATHER_KEY' && 
                                     openWeatherApiKey.trim() !== '');

                var layerCode = '';
                switch (currentLayerType) {
                    case 'CLOUD_COVER': layerCode = 'clouds_new'; break;
                    case 'TEMPERATURE': layerCode = 'temp_new'; break;
                    case 'WIND_SPEED': layerCode = 'wind_new'; break;
                    case 'PRESSURE': layerCode = 'pressure_new'; break;
                    case 'HUMIDITY': layerCode = 'precipitation_new'; break;
                    case 'SATELLITE': layerCode = 'clouds_new'; break;
                    case 'LIGHTNING': layerCode = 'precipitation_new'; break;
                }

                if (isApiKeyValid && layerCode) {
                    showLoader(true, 'Fetching Weather Overlay...');
                    var owmUrl = 'https://tile.openweathermap.org/map/' + layerCode + '/{z}/{x}/{y}.png?appid=' + openWeatherApiKey;

                    owmTileLayer = L.tileLayer(owmUrl, {
                        opacity: 0.75,
                        tileSize: 256,
                        maxZoom: 18,
                        zIndex: 200
                    }).addTo(map);

                    setTimeout(function() { showLoader(false); }, 1000);
                } else {
                    logError('[WeatherLayerError] API key invalid for layer: ' + currentLayerType);
                    if (window.AndroidMap && window.AndroidMap.onApiKeyMissing) {
                        window.AndroidMap.onApiKeyMissing(currentLayerType);
                    }
                    showStatusBanner('Weather layer unavailable', true);
                }
            }
        }

        // Window resize observer
        var container = document.getElementById('map');
        if (typeof ResizeObserver !== 'undefined' && container) {
            var ro = new ResizeObserver(function() {
                invalidateMapSize();
            });
            ro.observe(container);
        }

        window.addEventListener('resize', function() {
            invalidateMapSize();
        });

        window.addEventListener('offline', function() {
            logError('Device went offline!');
            showStatusBanner('No internet connection.', true);
        });

        window.addEventListener('online', function() {
            logDebug('Device reconnected online.');
            hideStatusBanner();
            if (window.AndroidMap && window.AndroidMap.onRequestTimelineRefresh) {
                window.AndroidMap.onRequestTimelineRefresh();
            } else {
                fetchRainViewerTimelineDirectly();
            }
        });

        function safeInit() {
    logDebug('safeInit starting execution...');
    var attempts = 0;
    var maxAttempts = 100;
    var delayMs = 150;
    
    // Show loader immediately
    showLoader(true, 'Initializing SkySphere Radar Engine...');
    
    function check() {
        // Check if Leaflet is loaded
        if (typeof L !== 'undefined') {
            logDebug('Leaflet library detected! Calling initializeLeafletMap()...');
            showLoader(true, 'Starting Leaflet map engine...');
            initializeLeafletMap();
            return;
        }
        
        attempts++;
        if (attempts < maxAttempts) {
            logDebug('Waiting for Leaflet... attempt ' + attempts + '/' + maxAttempts);
            setTimeout(check, delayMs);
        } else {
            logError('CRITICAL - Leaflet JS library failed to load after ' + (maxAttempts * delayMs / 1000) + ' seconds.');
            showStatusBanner('Failed to load Leaflet library', true);
            showLoader(false);
            
            // Show visible error on screen
            var loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = '❌ Leaflet library failed to load. Please check assets folder.';
                loader.style.display = 'block';
                loader.style.color = '#FF5252';
                loader.style.background = 'rgba(30, 30, 30, 0.95)';
                loader.style.borderColor = '#FF5252';
                loader.style.boxShadow = '0 0 30px rgba(255, 82, 82, 0.3)';
                loader.style.padding = '20px 30px';
                loader.style.fontSize = '14px';
                loader.style.textAlign = 'center';
                loader.style.maxWidth = '80%';
            }
            
            // Also try to load from CDN as last resort
            try {
                var script = document.createElement('script');
                script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                script.onload = function() {
                    logDebug('Leaflet loaded from CDN fallback!');
                    showStatusBanner('Loaded from CDN fallback', false);
                    initializeLeafletMap();
                };
                document.head.appendChild(script);
                
                var link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                document.head.appendChild(link);
            } catch(e) {
                logError('CDN fallback failed: ' + e.message);
            }
        }
    }
    
    // Wait a bit for DOM to settle
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(check, 200);
    } else {
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(check, 200);
        });
    }
}

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            safeInit();
        } else {
            document.addEventListener('DOMContentLoaded', safeInit);
        }
    </script>
</body>
</html>
