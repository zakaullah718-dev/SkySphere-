<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SkySphere Weather Radar</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width,height=device-height" />
    <link rel="stylesheet" href="leaflet.css" onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';" />
    <script src="leaflet.js" onerror="this.onerror=null;this.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            min-width: 100%;
            min-height: 100%;
            background-color: #070913;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1322;
            z-index: 1;
        }
        .leaflet-container {
            background-color: #0d1322 !important;
        }

        /* Glowing loader indicator */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.92);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid rgba(0, 229, 255, 0.4);
            font-size: 14px;
            font-weight: 700;
            color: #00E5FF;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Status warning toast */
        #api-warning {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: rgba(30, 41, 59, 0.94);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 12px;
            color: #00E5FF;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.85; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
            50% { opacity: 1; box-shadow: 0 10px 35px rgba(0, 229, 255, 0.25); }
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Custom GPS marker pulsation */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00E5FF;
            border: 3px solid #FFFFFF;
            box-shadow: 0 0 14px #00E5FF;
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { box-shadow: 0 0 0 14px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loader">Initializing SkySphere Doppler Radar...</div>
    <div id="api-warning">Radar temporarily unavailable</div>

    <script>
        var map = null;
        var mapLoaded = false;
        var currentGpsMarker = null;
        var currentLayerType = 'RAINFALL';
        var weatherApiKey = '';
        var radarOpacity = 0.85;
        var activeTimelineIndex = 3;
        var rainViewerHost = 'https://tilecache.rainviewer.com';
        var radarFrames = [];
        var radarTileLayers = [];
        var owmTileLayer = null;

        function showLoader(show, message) {
            var loader = document.getElementById('loader');
            if (!loader) return;
            if (show) {
                loader.innerText = message || 'Loading Weather Radar...';
                loader.style.display = 'block';
            } else {
                loader.style.display = 'none';
            }
        }

        function showRadarUnavailable(message) {
            var warn = document.getElementById('api-warning');
            if (!warn) return;
            warn.innerText = message || 'Radar temporarily unavailable';
            warn.style.display = 'block';
        }

        function hideRadarUnavailable() {
            var warn = document.getElementById('api-warning');
            if (warn) warn.style.display = 'none';
        }

        function invalidateMapSize() {
            if (map) {
                map.invalidateSize();
            }
        }

        function initializeMapEngine() {
            if (map) return;
            try {
                console.log('SkySphere JS: Initializing Leaflet map engine...');
                showLoader(true, 'Rendering CartoDB Dark Radar Canvas...');

                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false,
                    fadeAnimation: false,
                    zoomAnimation: true,
                    minZoom: 1,
                    maxZoom: 18
                }).setView([20, 0], 3);

                // CartoDB Dark Matter tile basemap
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png', {
                    subdomains: ['a', 'b', 'c', 'd'],
                    maxZoom: 19,
                    minZoom: 0,
                    attribution: '&copy; CartoDB &copy; OpenStreetMap'
                }).addTo(map);

                // Map click listener
                map.on('click', function(e) {
                    var lat = e.latlng.lat;
                    var lon = e.latlng.lng;
                    lon = ((lon + 180) % 360 + 360) % 360 - 180;
                    updateSelectedMarker(lat, lon);
                    if (window.AndroidMap && window.AndroidMap.onCoordinatesSelected) {
                        window.AndroidMap.onCoordinatesSelected(lat, lon);
                    }
                });

                mapLoaded = true;
                console.log('SkySphere JS: Leaflet map engine ready!');
                showLoader(false);

                invalidateMapSize();
                setTimeout(function() { invalidateMapSize(); }, 100);
                setTimeout(function() { invalidateMapSize(); }, 300);

                if (window.AndroidMap && window.AndroidMap.onMapLoaded) {
                    console.log('SkySphere JS: Calling AndroidMap.onMapLoaded() native bridge');
                    window.AndroidMap.onMapLoaded();
                }
                if (window.AndroidMap && window.AndroidMap.onRequestTimelineRefresh) {
                    window.AndroidMap.onRequestTimelineRefresh();
                } else {
                    fetchRainViewerTimelineDirectly();
                }

            } catch (e) {
                console.error('SkySphere JS: Leaflet init error: ' + e.message);
                showRadarUnavailable('Map initialization error: ' + e.message);
            }
        }

        var mapContainer = document.getElementById('map');
        if (typeof ResizeObserver !== 'undefined' && mapContainer) {
            var ro = new ResizeObserver(function() {
                invalidateMapSize();
            });
            ro.observe(mapContainer);
        }

        window.addEventListener('resize', function() {
            invalidateMapSize();
        });

        window.addEventListener('offline', function() {
            showRadarUnavailable('Offline Mode - Using cached map & radar tiles');
        });

        window.addEventListener('online', function() {
            hideRadarUnavailable();
            if (window.AndroidMap && window.AndroidMap.onRequestTimelineRefresh) {
                window.AndroidMap.onRequestTimelineRefresh();
            } else {
                fetchRainViewerTimelineDirectly();
            }
        });

        function setCenter(lat, lon, zoom) {
            if (!map) return;
            var currentZoom = zoom || map.getZoom();
            map.flyTo([lat, lon], currentZoom, { duration: 1.0 });
            updateSelectedMarker(lat, lon);
            invalidateMapSize();
        }

        function zoomIn() {
            if (map) map.zoomIn();
        }

        function zoomOut() {
            if (map) map.zoomOut();
        }

        function resetNorth() {
            if (map && currentGpsMarker) {
                map.panTo(currentGpsMarker.getLatLng());
            }
        }

        function updateSelectedMarker(lat, lon) {
            if (!map) return;
            if (currentGpsMarker) {
                map.removeLayer(currentGpsMarker);
            }
            var customIcon = L.divIcon({
                className: 'custom-marker',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });
            currentGpsMarker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
        }

        function setWeatherApiKey(key) {
            weatherApiKey = key;
            if (mapLoaded && currentLayerType !== 'RAINFALL') {
                updateWeatherLayers();
            }
        }

        function setWeatherLayer(layerType) {
            currentLayerType = layerType;
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        function setRadarOpacity(opacity) {
            radarOpacity = opacity;
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        function updateRadarTimeline(payload) {
            hideRadarUnavailable();
            var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
            if (!data || !data.frames || data.frames.length === 0) {
                showRadarUnavailable('Radar temporarily unavailable');
                return;
            }

            rainViewerHost = data.host || 'https://tilecache.rainviewer.com';
            radarFrames = data.frames || [];

            setupRadarTileLayers();
            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        function fetchRainViewerTimelineDirectly() {
            showLoader(true, 'Downloading RainViewer Radar Timeline...');
            fetch('https://api.rainviewer.com/public/weather-maps.json')
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP Status ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    showLoader(false);
                    hideRadarUnavailable();
                    if (data && data.radar && data.radar.past) {
                        rainViewerHost = data.host || 'https://tilecache.rainviewer.com';
                        var past = data.radar.past || [];
                        var nowcast = data.radar.nowcast || [];

                        var nowIndex = Math.max(0, past.length - 1);
                        var nowFrame = past[nowIndex] || { time: Math.floor(Date.now()/1000), path: '' };

                        var compiled = [
                            past[Math.max(0, nowIndex - 18)] || nowFrame,
                            past[Math.max(0, nowIndex - 12)] || nowFrame,
                            past[Math.max(0, nowIndex - 6)] || nowFrame,
                            nowFrame,
                            (nowcast.length > 5 ? nowcast[5] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 11 ? nowcast[11] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 17 ? nowcast[17] : (nowcast[0] || nowFrame))
                        ];

                        radarFrames = compiled.map(function(f) {
                            var cleanHost = rainViewerHost.replace(/\/$/, '');
                            var cleanPath = (f.path || '').replace(/\/$/, '');
                            return {
                                time: f.time,
                                path: f.path,
                                tileUrl: cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png'
                            };
                        });

                        setupRadarTileLayers();
                        if (currentLayerType === 'RAINFALL') {
                            displayFrameAtIndex(activeTimelineIndex);
                        }
                    } else {
                        showRadarUnavailable('Radar temporarily unavailable');
                    }
                })
                .catch(function(err) {
                    showLoader(false);
                    showRadarUnavailable('Radar temporarily unavailable (Offline)');
                });
        }

        function setupRadarTileLayers() {
            if (!map) return;

            radarTileLayers.forEach(function(item) {
                if (item && item.layer) {
                    map.removeLayer(item.layer);
                }
            });
            radarTileLayers = [];

            radarFrames.forEach(function(frame, idx) {
                var cleanHost = rainViewerHost.replace(/\/$/, '');
                var cleanPath = (frame.path || '').replace(/\/$/, '');
                var tileUrl = frame.tileUrl || (cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png');

                var layer = L.tileLayer(tileUrl, {
                    tileSize: 256,
                    opacity: 0,
                    maxZoom: 18,
                    minZoom: 0,
                    zIndex: 10 + idx
                }).addTo(map);

                radarTileLayers.push({
                    time: frame.time,
                    layer: layer
                });
            });
        }

        function setTimelineIndex(index) {
            activeTimelineIndex = Math.max(0, Math.min(6, index));
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        function displayFrameAtIndex(index) {
            if (!map || radarTileLayers.length === 0) return;

            var boundedIndex = Math.max(0, Math.min(radarTileLayers.length - 1, index));

            radarTileLayers.forEach(function(item, idx) {
                if (idx === boundedIndex) {
                    item.layer.setOpacity(radarOpacity);
                } else {
                    item.layer.setOpacity(0);
                }
            });
        }

        function updateWeatherLayers() {
            if (!map) return;
            hideRadarUnavailable();

            if (owmTileLayer) {
                map.removeLayer(owmTileLayer);
                owmTileLayer = null;
            }

            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            } else {
                radarTileLayers.forEach(function(item) {
                    item.layer.setOpacity(0);
                });

                var isApiKeyValid = (weatherApiKey && 
                                     !weatherApiKey.includes('PLACEholder') && 
                                     !weatherApiKey.includes('placeholder') && 
                                     weatherApiKey !== 'MY_WEATHER_KEY' && 
                                     weatherApiKey.trim() !== '');

                var layerCode = '';
                switch (currentLayerType) {
                    case 'CLOUD_COVER': layerCode = 'clouds_new'; break;
                    case 'TEMPERATURE': layerCode = 'temp_new'; break;
                    case 'WIND_SPEED': layerCode = 'wind_new'; break;
                    case 'PRESSURE': layerCode = 'pressure_new'; break;
                    case 'HUMIDITY': layerCode = 'precipitation_new'; break;
                    case 'SATELLITE': layerCode = 'clouds_new'; break;
                    case 'LIGHTNING': layerCode = 'precipitation_new'; break;
                }

                if (isApiKeyValid && layerCode) {
                    showLoader(true, 'Fetching OpenWeatherMap Overlay...');
                    var owmUrl = 'https://tile.openweathermap.org/map/' + layerCode + '/{z}/{x}/{y}.png?appid=' + weatherApiKey;

                    owmTileLayer = L.tileLayer(owmUrl, {
                        opacity: 0.75,
                        tileSize: 256,
                        maxZoom: 18,
                        zIndex: 200
                    }).addTo(map);

                    setTimeout(function() { showLoader(false); }, 1000);
                } else {
                    if (window.AndroidMap) {
                        window.AndroidMap.onApiKeyMissing(currentLayerType);
                    }
                    showRadarUnavailable(currentLayerType + ' Overlay requires valid API key');
                }
            }
        }

        function safeInit() {
            console.log('SkySphere JS: safeInit starting execution');
            var attempts = 0;
            function check() {
                if (typeof L !== 'undefined') {
                    console.log('SkySphere JS: Leaflet detected, initializing map...');
                    initializeMapEngine();
                } else {
                    attempts++;
                    if (attempts < 50) {
                        setTimeout(check, 100);
                    } else {
                        console.error('SkySphere JS: CRITICAL - Leaflet library failed to load');
                        showRadarUnavailable('Failed to initialize map library');
                    }
                }
            }
            check();
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            safeInit();
        } else {
            document.addEventListener('DOMContentLoaded', safeInit);
        }
    </script>
</body>
</html>
