<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SkySphere Real-Time Weather Radar</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <!-- Include Leaflet CSS and JS CDN with cdnjs high-reliability fail-safe fallbacks -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css';" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js';"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #070913; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background: #070913; }
        
        /* Premium glowing loading spinner */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.85);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid rgba(0, 229, 255, 0.35);
            font-size: 14px;
            font-weight: 700;
            color: #00E5FF;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Ambient warning toast */
        #api-warning {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 12px;
            color: #F87171;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.85; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
            50% { opacity: 1; box-shadow: 0 10px 35px rgba(0, 229, 255, 0.2); }
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Custom marker pulsing animation */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00E5FF;
            border: 3px solid #FFFFFF;
            box-shadow: 0 0 12px #00E5FF;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        .leaflet-container {
            background: #070913 !important;
        }
        /* Hide default Zoom and Attribution controls to keep UI clean and consistent */
        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loader">Fetching Doppler Radar...</div>
    <div id="api-warning"></div>

    <!-- Error/Fallback visual overlay -->
    <div id="error-overlay" style="position: absolute; top: 0; bottom: 0; left: 0; right: 0; background-color: #070913; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 24px; z-index: 2000; font-family: sans-serif;">
        <div style="font-size: 54px; margin-bottom: 20px;">🌐</div>
        <div style="font-size: 20px; font-weight: bold; color: #FF5252; margin-bottom: 12px;" id="error-title">Map Interface Unreachable</div>
        <div style="font-size: 14px; color: #A0AEC0; max-width: 300px; line-height: 1.6; margin-bottom: 24px;" id="error-desc">Initializing map telemetry engine...</div>
        <button onclick="window.location.reload();" style="background: rgba(0, 229, 255, 0.15); border: 1px solid #00E5FF; color: #00E5FF; padding: 10px 24px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Reload Map</button>
    </div>

    <script>
        // High-reliability global error boundary logger
        window.onerror = function(message, source, lineno, colno, error) {
            var errStr = message + ' at ' + (source || 'unknown') + ':' + lineno;
            console.error('JS Uncaught Error Boundary: ' + errStr);
            return false;
        };

        var map = null;
        var mapLoaded = false;
        var currentLayerType = 'RAINFALL';
        var weatherApiKey = '';
        var maptilerApiKey = '';
        var selectedCoordinates = null;
        var currentGpsMarker = null;

        // Overlay tile layers and sources
        var weatherTileLayer = null;
        var baseTileLayer = null;

        // RainViewer timeline state
        var radarFrames = [];
        var timelineIndex = 3; // Default to 'Now' (index 3 out of 0-6)

        // Custom Error UI Handler
        function showError(title, desc) {
            console.error('Displaying Map Error Overlay: ' + title + ' - ' + desc);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = desc;
            document.getElementById('error-overlay').style.display = 'flex';
        }

        // Initialize Map
        function initializeMapEngine() {
            try {
                console.log('Initializing Leaflet engine with high-reliability Dark Matter raster style');
                
                // Initialize map centered at [20, 0] zoom 2.2
                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false,
                    minZoom: 1,
                    maxZoom: 16
                }).setView([20, 0], 2.2);

                // Add default CartoDB Dark Matter style layer
                updateBaseMap();

                // Call loaded hook
                setTimeout(function() {
                    mapLoaded = true;
                    if (window.AndroidMap) {
                        window.AndroidMap.onMapLoaded();
                    }
                    // Fetch initial overlays
                    fetchRainViewerFrames();
                }, 500);

                // Click listener
                map.on('click', function(e) {
                    var lat = e.latlng.lat;
                    var lon = e.latlng.lng;
                    // Wrap longitude
                    lon = ((lon + 180) % 360 + 360) % 360 - 180;
                    selectedCoordinates = { lat: lat, lon: lon };
                    updateSelectedMarker(lat, lon);
                    if (window.AndroidMap) {
                        window.AndroidMap.onCoordinatesSelected(lat, lon);
                    }
                });

            } catch (ex) {
                console.error('Leaflet initialization threw exception:', ex);
                showError('Crash Detected', 'Failed to compile or instantiate map engine: ' + ex.message);
            }
        }

        // Determine which base map style to load
        function updateBaseMap() {
            if (!map) return;
            if (baseTileLayer) {
                map.removeLayer(baseTileLayer);
            }

            var isMapTilerValid = (maptilerApiKey && 
                                  !maptilerApiKey.includes('PLACEholder') && 
                                  !maptilerApiKey.includes('placeholder') && 
                                  maptilerApiKey !== 'MY_MAPTILER_KEY' && 
                                  maptilerApiKey.trim() !== '');

            var tileUrl = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png";
            var tileOptions = {
                maxZoom: 20,
                tileSize: 256,
                zoomOffset: 0
            };

            if (isMapTilerValid) {
                console.log('Upgrading style to MapTiler premium Dark Matter style');
                tileUrl = "https://api.maptiler.com/maps/darkmatter/256/{z}/{x}/{y}.png?key=" + maptilerApiKey;
            } else {
                console.log('Using CartoDB Dark Matter default basemap style with subdomains');
                tileOptions.subdomains = 'abcd';
            }

            baseTileLayer = L.tileLayer(tileUrl, tileOptions).addTo(map);
        }

        // Bridge function: Centering Map
        function setCenter(lat, lon, zoom) {
            if (!map) return;
            var currentZoom = zoom || map.getZoom();
            map.flyTo([lat, lon], currentZoom, {
                animate: true,
                duration: 1.5
            });
            updateSelectedMarker(lat, lon);
        }

        function updateSelectedMarker(lat, lon) {
            if (!map) return;
            if (currentGpsMarker) {
                map.removeLayer(currentGpsMarker);
            }

            var customIcon = L.divIcon({
                className: 'custom-marker',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });

            currentGpsMarker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
        }

        // Bridge function: Sync Weather API key
        function setWeatherApiKey(key) {
            weatherApiKey = key;
            console.log('Syncing Weather API Key to map: ' + (key ? 'PRESENT (len: ' + key.length + ')' : 'ABSENT'));
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        // Bridge function: Sync MapTiler API Key
        function setMapTilerApiKey(key) {
            var isKeyValid = (key && 
                              !key.includes('PLACEholder') && 
                              !key.includes('placeholder') && 
                              key !== 'MY_MAPTILER_KEY' && 
                              key.trim() !== '');
            console.log('Syncing MapTiler Key in Leaflet: ' + (isKeyValid ? 'VALID' : 'INVALID/ABSENT'));
            if (isKeyValid && key !== maptilerApiKey) {
                maptilerApiKey = key;
                updateBaseMap();
            }
        }

        // Bridge function: Switch layers
        function setWeatherLayer(layerType) {
            currentLayerType = layerType;
            console.log('Switching weather overlay in Leaflet to: ' + layerType);
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        // Bridge function: Set timeline index (0 to 6)
        function setTimelineIndex(index) {
            timelineIndex = Math.max(0, Math.min(6, index));
            console.log('Timeline slider updated to index: ' + timelineIndex);
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                updateRadarOverlayFromTimeline();
            }
        }

        // Show/hide custom loader
        function showLoader(visible, text) {
            var loader = document.getElementById('loader');
            if (text) loader.innerText = text;
            loader.style.display = visible ? 'block' : 'none';
        }

        // Fetch RainViewer frames
        function fetchRainViewerFrames() {
            showLoader(true, 'Connecting to RainViewer Live Doppler Radar...');
            fetch('https://api.rainviewer.com/public/weather-maps.json')
                .then(response => {
                    if (!response.ok) throw new Error('HTTP Status ' + response.status);
                    return response.json();
                })
                .then(data => {
                    showLoader(false);
                    if (data && data.radar && data.radar.past) {
                        var past = data.radar.past || [];
                        var nowcast = data.radar.nowcast || [];
                        
                        // Combine or collect frames to map to our 7-step timeline slider:
                        // Slider step indices: 0, 1, 2, 3 (Now), 4, 5, 6.
                        // We map them to the frames returned from RainViewer.
                        // Typically, past contains several frames (e.g., 10-12 frames, each 10 mins apart).
                        // Let's extract:
                        // - Step 3 (Now): The last item in 'past'.
                        // - Step 2 (-1h): Past item at (last - 6) (assuming 10-min intervals)
                        // - Step 1 (-2h): Past item at (last - 12)
                        // - Step 0 (-3h): Past item at (last - 18)
                        // - Step 4 (+1h): Nowcast[5] or last + 6 (forecast)
                        // - Step 5 (+2h): Nowcast[11] or last + 12
                        // - Step 6 (+3h): Nowcast[17] or last + 18
                        
                        radarFrames = [];
                        
                        // Let's resolve the actual frames from past and nowcast
                        var nowIndex = past.length - 1;
                        
                        // Step 0: -3 hours
                        var s0 = Math.max(0, nowIndex - 18);
                        radarFrames.push(past[s0]);
                        
                        // Step 1: -2 hours
                        var s1 = Math.max(0, nowIndex - 12);
                        radarFrames.push(past[s1]);
                        
                        // Step 2: -1 hour
                        var s2 = Math.max(0, nowIndex - 6);
                        radarFrames.push(past[s2]);
                        
                        // Step 3: Now (latest past)
                        radarFrames.push(past[nowIndex]);
                        
                        // Step 4: +1 hour forecast
                        if (nowcast.length > 5) radarFrames.push(nowcast[5]);
                        else if (nowcast.length > 0) radarFrames.push(nowcast[nowcast.length - 1]);
                        else radarFrames.push(past[nowIndex]); // fallback
                        
                        // Step 5: +2 hours forecast
                        if (nowcast.length > 11) radarFrames.push(nowcast[11]);
                        else if (nowcast.length > 0) radarFrames.push(nowcast[nowcast.length - 1]);
                        else radarFrames.push(past[nowIndex]); // fallback
                        
                        // Step 6: +3 hours forecast
                        if (nowcast.length > 17) radarFrames.push(nowcast[17]);
                        else if (nowcast.length > 0) radarFrames.push(nowcast[nowcast.length - 1]);
                        else radarFrames.push(past[nowIndex]); // fallback

                        console.log('Successfully compiled 7 timeline radar frames:', radarFrames);
                        if (currentLayerType === 'RAINFALL') {
                            updateRadarOverlayFromTimeline();
                        }
                    }
                })
                .catch(err => {
                    showLoader(false);
                    console.error('RainViewer initialization failed:', err);
                });
        }

        // Update the radar overlay using the current timelineIndex
        function updateRadarOverlayFromTimeline() {
            if (!map || radarFrames.length === 0) return;
            
            if (weatherTileLayer) {
                map.removeLayer(weatherTileLayer);
            }

            var activeFrame = radarFrames[timelineIndex];
            if (!activeFrame) {
                console.warn('No radar frame available at timeline index: ' + timelineIndex);
                return;
            }

            var radarTileUrl = 'https://tilecache.rainviewer.com/v2/radar/' + activeFrame.time + '/256/{z}/{x}/{y}/2/1_1.png';
            console.log('Displaying radar frame at timeline index ' + timelineIndex + ' (timestamp: ' + activeFrame.time + ')');

            weatherTileLayer = L.tileLayer(radarTileUrl, {
                opacity: 0.85,
                maxZoom: 18,
                tileSize: 256
            }).addTo(map);
        }

        // Main Weather Layers refresh manager
        function updateWeatherLayers() {
            if (!map) return;
            var warningEl = document.getElementById('api-warning');
            warningEl.style.display = 'none';

            // Remove existing weather tile layer
            if (weatherTileLayer) {
                map.removeLayer(weatherTileLayer);
                weatherTileLayer = null;
            }

            var isApiKeyValid = (weatherApiKey && 
                                 !weatherApiKey.includes('PLACEholder') && 
                                 !weatherApiKey.includes('placeholder') && 
                                 weatherApiKey !== 'MY_WEATHER_KEY' && 
                                 weatherApiKey.trim() !== '');

            if (currentLayerType === 'RAINFALL') {
                if (radarFrames.length > 0) {
                    updateRadarOverlayFromTimeline();
                } else {
                    fetchRainViewerFrames();
                }
            } else {
                // OpenWeatherMap layers
                var layerCode = '';
                switch (currentLayerType) {
                    case 'CLOUD_COVER': layerCode = 'clouds_new'; break;
                    case 'TEMPERATURE': layerCode = 'temp_new'; break;
                    case 'WIND_SPEED': layerCode = 'wind_new'; break;
                    case 'PRESSURE': layerCode = 'pressure_new'; break;
                    case 'HUMIDITY': layerCode = 'precipitation_new'; break;
                }

                if (isApiKeyValid) {
                    showLoader(true, 'Fetching OpenWeatherMap Overlay...');
                    var owmUrl = 'https://tile.openweathermap.org/map/' + layerCode + '/{z}/{x}/{y}.png?appid=' + weatherApiKey;
                    console.log('Loading OpenWeatherMap ' + currentLayerType + ' layer with OWM API Key');
                    
                    weatherTileLayer = L.tileLayer(owmUrl, {
                        opacity: 0.75,
                        maxZoom: 18,
                        tileSize: 256
                    }).addTo(map);

                    // Fade out loader after tile loads
                    weatherTileLayer.on('load', function() {
                        showLoader(false);
                    });
                    setTimeout(function() { showLoader(false); }, 1500); // Safety timeout
                } else {
                    console.warn('Weather API Key missing. Activating aesthetic fallbacks.');
                    
                    // Display premium fallback alert
                    warningEl.innerHTML = `<strong>${currentLayerType} Satellite Overlay:</strong> Real-time weather satellite tiles require an active OpenWeatherMap API key. Configure it in the AI Studio Secrets panel.`;
                    warningEl.style.display = 'block';

                    if (window.AndroidMap) {
                        window.AndroidMap.onApiKeyMissing(currentLayerType);
                    }

                    // Create aesthetic custom fallback layer for visual richness using Leaflet Circles
                    drawAestheticFallbacks();
                }
            }
        }

        // Draw aesthetic fallbacks for temperature/wind/humidity/clouds
        var fallbackLayerGroup = null;
        function drawAestheticFallbacks() {
            if (!map) return;
            if (fallbackLayerGroup) {
                map.removeLayer(fallbackLayerGroup);
            }
            fallbackLayerGroup = L.layerGroup().addTo(map);

            // We generate a few large semi-transparent circular patterns with appropriate colors:
            // e.g., warm reddish hues for temperature, soft whites for clouds, blue/green for rainfall.
            var color = '#00E5FF';
            var fillOpacity = 0.15;
            if (currentLayerType === 'TEMPERATURE') {
                // Red/Orange/Blue zones
                L.circle([30, -40], { color: 'transparent', fillColor: '#FF5722', fillOpacity: 0.25, radius: 2500000 }).addTo(fallbackLayerGroup);
                L.circle([10, 15], { color: 'transparent', fillColor: '#FF9800', fillOpacity: 0.2, radius: 3000000 }).addTo(fallbackLayerGroup);
                L.circle([-15, -60], { color: 'transparent', fillColor: '#E91E63', fillOpacity: 0.2, radius: 2000000 }).addTo(fallbackLayerGroup);
                L.circle([55, 40], { color: 'transparent', fillColor: '#2196F3', fillOpacity: 0.18, radius: 2800000 }).addTo(fallbackLayerGroup);
            } else if (currentLayerType === 'CLOUD_COVER') {
                // Cloudy white zones
                L.circle([15, -100], { color: 'transparent', fillColor: '#FFFFFF', fillOpacity: 0.2, radius: 2500000 }).addTo(fallbackLayerGroup);
                L.circle([45, -30], { color: 'transparent', fillColor: '#E2E8F0', fillOpacity: 0.15, radius: 3200000 }).addTo(fallbackLayerGroup);
                L.circle([35, 120], { color: 'transparent', fillColor: '#FFFFFF', fillOpacity: 0.22, radius: 2800000 }).addTo(fallbackLayerGroup);
            } else if (currentLayerType === 'WIND_SPEED') {
                // Teal flow swirls
                L.circle([0, 100], { color: 'transparent', fillColor: '#00E5FF', fillOpacity: 0.15, radius: 2200000 }).addTo(fallbackLayerGroup);
                L.circle([40, -120], { color: 'transparent', fillColor: '#10B981', fillOpacity: 0.15, radius: 2600000 }).addTo(fallbackLayerGroup);
            } else {
                // general soft ambient moisture indicators
                L.circle([20, 20], { color: 'transparent', fillColor: '#3B82F6', fillOpacity: 0.12, radius: 3000000 }).addTo(fallbackLayerGroup);
            }

            // Bind fallback layer group to the weatherTileLayer reference so it gets cleared properly on layer change
            weatherTileLayer = fallbackLayerGroup;
        }

        // Safe, asynchronous, high-reliability initialization loader
        function safeInit() {
            var attempts = 0;
            function check() {
                if (typeof L !== 'undefined') {
                    console.log('Leaflet (L) library is fully resolved. Initializing mapping engine.');
                    initializeMapEngine();
                } else {
                    attempts++;
                    console.warn('Leaflet (L) is not defined yet. Retry attempt: ' + attempts + '/50');
                    if (attempts < 50) {
                        setTimeout(check, 100);
                    } else {
                        showError('Script Load Failure', 'Failed to resolve the Leaflet mapping library (L) from any CDN. Please check your internet connection and try reloading the map.');
                    }
                }
            }
            check();
        }

        // Initialize when DOM/scripts are ready
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            safeInit();
        } else {
            window.addEventListener('DOMContentLoaded', safeInit);
        }
    </script>
</body>
</html>
