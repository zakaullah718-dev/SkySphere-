<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>SkySphere WebGL Real-Time Weather Radar</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width,height=device-height" />
    <!-- Local MapLibre GL JS and CSS with remote fallback -->
    <link rel="stylesheet" href="maplibre-gl.css" onerror="this.onerror=null;this.href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css';" />
    <script src="maplibre-gl.js" onerror="this.onerror=null;this.src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js';"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            min-width: 100%;
            min-height: 100%;
            background-color: #070913;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1322;
            z-index: 1;
        }

        /* Glowing loader indicator */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.92);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid rgba(0, 229, 255, 0.4);
            font-size: 14px;
            font-weight: 700;
            color: #00E5FF;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Status warning toast */
        #api-warning {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: rgba(30, 41, 59, 0.94);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 12px;
            color: #00E5FF;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.85; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
            50% { opacity: 1; box-shadow: 0 10px 35px rgba(0, 229, 255, 0.25); }
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Custom GPS marker pulsation */
        .custom-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00E5FF;
            border: 3px solid #FFFFFF;
            box-shadow: 0 0 14px #00E5FF;
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        .maplibregl-canvas {
            outline: none !important;
            background-color: #070913 !important;
        }
        .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right, .maplibregl-ctrl-top-left, .maplibregl-ctrl-top-right {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loader">Initializing WebGL Doppler Radar...</div>
    <div id="api-warning">Radar temporarily unavailable</div>

    <div id="error-overlay" style="position: absolute; top: 0; bottom: 0; left: 0; right: 0; background-color: #070913; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 24px; z-index: 2000;">
        <div style="font-size: 54px; margin-bottom: 20px;">🌐</div>
        <div style="font-size: 20px; font-weight: bold; color: #FF5252; margin-bottom: 12px;" id="error-title">Map Engine Failure</div>
        <div style="font-size: 14px; color: #A0AEC0; max-width: 300px; line-height: 1.6; margin-bottom: 24px;" id="error-desc">Initializing WebGL mapping engine...</div>
        <button onclick="window.location.reload();" style="background: rgba(0, 229, 255, 0.15); border: 1px solid #00E5FF; color: #00E5FF; padding: 10px 24px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Reload Engine</button>
    </div>

    <script>
        var map = null;
        var mapLoaded = false;
        var currentLayerType = 'RAINFALL';
        var weatherApiKey = '';
        var currentGpsMarker = null;

        // Radar timeline variables
        var radarFrames = []; // Array of { time, path, tileUrl }
        var activeTimelineIndex = 3; // Default to 'Now'
        var rainViewerHost = 'https://tilecache.rainviewer.com';
        var radarOpacity = 0.85;

        function invalidateMapSize() {
            if (map) {
                map.resize();
            }
        }

        function showError(title, desc) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = desc;
            document.getElementById('error-overlay').style.display = 'flex';
        }

        function showRadarUnavailable(msg) {
            var warningEl = document.getElementById('api-warning');
            warningEl.innerText = msg || 'Radar temporarily unavailable';
            warningEl.style.display = 'block';
        }

        function hideRadarUnavailable() {
            var warningEl = document.getElementById('api-warning');
            warningEl.style.display = 'none';
        }

        function showLoader(visible, text) {
            var loader = document.getElementById('loader');
            if (text) loader.innerText = text;
            loader.style.display = visible ? 'block' : 'none';
        }

        // Initialize MapLibre GL JS Engine with 100% free CartoDB Dark basemap
        function initializeMapEngine() {
            try {
                console.log('SkySphere JS: [INIT 1] Starting initializeMapEngine()...');
                
                if (typeof maplibregl === 'undefined') {
                    console.error('SkySphere JS: CRITICAL - maplibregl is undefined!');
                    showError('Engine Missing', 'MapLibre GL JS library not found.');
                    return;
                }

                if (typeof maplibregl.supported === 'function') {
                    try {
                        if (!maplibregl.supported({ failIfMajorPerformanceCaveat: false })) {
                            console.warn('SkySphere JS: WARNING - maplibregl.supported() returned false. Proceeding anyway...');
                        } else {
                            console.log('SkySphere JS: WebGL supported check passed!');
                        }
                    } catch (suppErr) {
                        console.warn('SkySphere JS: maplibregl.supported check threw warning:', suppErr);
                    }
                } else {
                    console.log('SkySphere JS: maplibregl loaded.');
                }

                var darkStyle = {
                    version: 8,
                    sources: {
                        'carto-dark': {
                            type: 'raster',
                            tiles: [
                                'https://basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png',
                                'https://a.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png',
                                'https://b.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png',
                                'https://c.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png',
                                'https://d.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png'
                            ],
                            tileSize: 256,
                            minzoom: 0,
                            maxzoom: 19,
                            attribution: '&copy; CartoDB &copy; OpenStreetMap'
                        }
                    },
                    layers: [
                        {
                            id: 'map-background',
                            type: 'background',
                            paint: {
                                'background-color': '#0d1322'
                            }
                        },
                        {
                            id: 'carto-dark-layer',
                            type: 'raster',
                            source: 'carto-dark',
                            minzoom: 0,
                            maxzoom: 20,
                            paint: {
                                'raster-opacity': 1.0,
                                'raster-fade-duration': 0
                            }
                        }
                    ]
                };

                console.log('SkySphere JS: [INIT 2] Instantiating new maplibregl.Map()...');
                map = new maplibregl.Map({
                    container: 'map',
                    style: darkStyle,
                    center: [0, 20], // [lon, lat]
                    zoom: 2.2,
                    minZoom: 1,
                    maxZoom: 18,
                    attributionControl: false,
                    fadeDuration: 0,
                    trackResize: true,
                    failIfMajorPerformanceCaveat: false,
                    preserveDrawingBuffer: true
                });
                console.log('SkySphere JS: [INIT 3] maplibregl.Map object instantiated!');

                function notifyMapLoaded() {
                    if (mapLoaded) return;
                    mapLoaded = true;
                    console.log('SkySphere JS: [INIT 4] Map engine ready, notifying native bridge...');
                    showLoader(false);

                    invalidateMapSize();
                    setTimeout(function() { invalidateMapSize(); }, 100);
                    setTimeout(function() { invalidateMapSize(); }, 300);

                    if (window.AndroidMap && window.AndroidMap.onMapLoaded) {
                        console.log('SkySphere JS: [INIT 5] Calling AndroidMap.onMapLoaded() native bridge');
                        window.AndroidMap.onMapLoaded();
                    }
                    if (window.AndroidMap && window.AndroidMap.onRequestTimelineRefresh) {
                        window.AndroidMap.onRequestTimelineRefresh();
                    } else {
                        fetchRainViewerTimelineDirectly();
                    }
                }

                var mapContainer = document.getElementById('map');
                if (typeof ResizeObserver !== 'undefined') {
                    var ro = new ResizeObserver(function() {
                        invalidateMapSize();
                    });
                    ro.observe(mapContainer);
                }

                window.addEventListener('resize', function() {
                    invalidateMapSize();
                });

                window.addEventListener('offline', function() {
                    showRadarUnavailable('Offline Mode - Using cached map & radar tiles');
                });

                window.addEventListener('online', function() {
                    hideRadarUnavailable();
                    if (window.AndroidMap && window.AndroidMap.onRequestTimelineRefresh) {
                        window.AndroidMap.onRequestTimelineRefresh();
                    } else {
                        fetchRainViewerTimelineDirectly();
                    }
                });

                map.on('styledata', function() {
                    console.log('SkySphere JS: Map style data loaded');
                    notifyMapLoaded();
                });

                map.on('load', function() {
                    console.log('SkySphere JS: Map load event fired!');
                    notifyMapLoaded();
                });

                // Fallback timer: ensure notifyMapLoaded() runs if style/load events are delayed
                setTimeout(function() {
                    notifyMapLoaded();
                }, 400);

                map.on('click', function(e) {
                    var lat = e.lngLat.lat;
                    var lon = e.lngLat.lng;
                    lon = ((lon + 180) % 360 + 360) % 360 - 180;
                    updateSelectedMarker(lat, lon);
                    if (window.AndroidMap) {
                        window.AndroidMap.onCoordinatesSelected(lat, lon);
                    }
                });

                map.on('error', function(e) {
                    console.error('SkySphere JS MapLibre internal error: ' + (e.error ? e.error.message : JSON.stringify(e)));
                });

            } catch (ex) {
                console.error('SkySphere JS: WebGL Initialization Exception: ' + ex.message);
                showError('WebGL Initialization Failed', 'Hardware accelerated map failed to initialize: ' + ex.message);
            }
        }

        function setCenter(lat, lon, zoom) {
            if (!map) return;
            var currentZoom = zoom || map.getZoom();
            map.flyTo({
                center: [lon, lat],
                zoom: currentZoom,
                speed: 1.2,
                curve: 1.4,
                essential: true
            });
            updateSelectedMarker(lat, lon);
            invalidateMapSize();
        }

        function zoomIn() {
            if (map) map.zoomIn();
        }

        function zoomOut() {
            if (map) map.zoomOut();
        }

        function resetNorth() {
            if (map) map.resetNorth();
        }

        function updateSelectedMarker(lat, lon) {
            if (!map) return;
            if (currentGpsMarker) {
                currentGpsMarker.remove();
            }

            var el = document.createElement('div');
            el.className = 'custom-marker';

            currentGpsMarker = new maplibregl.Marker({ element: el })
                .setLngLat([lon, lat])
                .addTo(map);
        }

        function setWeatherApiKey(key) {
            weatherApiKey = key;
            if (mapLoaded && currentLayerType !== 'RAINFALL') {
                updateWeatherLayers();
            }
        }

        function setWeatherLayer(layerType) {
            currentLayerType = layerType;
            if (mapLoaded) {
                updateWeatherLayers();
            }
        }

        function setRadarOpacity(opacity) {
            radarOpacity = opacity;
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        // Bridge function called by Kotlin RadarMapController
        function updateRadarTimeline(payload) {
            hideRadarUnavailable();
            if (!payload || !payload.frames) {
                showRadarUnavailable('Radar temporarily unavailable');
                return;
            }

            rainViewerHost = payload.host || 'https://tilecache.rainviewer.com';
            radarFrames = payload.frames || [];

            preloadRadarSourcesAndLayers();
            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        // Direct API fetch fallback if running standalone or initial offline load
        function fetchRainViewerTimelineDirectly() {
            showLoader(true, 'Downloading RainViewer Radar Timeline...');
            fetch('https://api.rainviewer.com/public/weather-maps.json')
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP Status ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    showLoader(false);
                    hideRadarUnavailable();

                    if (data && data.radar && data.radar.past) {
                        rainViewerHost = data.host || 'https://tilecache.rainviewer.com';
                        var past = data.radar.past || [];
                        var nowcast = data.radar.nowcast || [];

                        var nowIndex = Math.max(0, past.length - 1);
                        var nowFrame = past[nowIndex] || { time: Math.floor(Date.now()/1000), path: '' };

                        var compiled = [
                            past[Math.max(0, nowIndex - 18)] || nowFrame,
                            past[Math.max(0, nowIndex - 12)] || nowFrame,
                            past[Math.max(0, nowIndex - 6)] || nowFrame,
                            nowFrame,
                            (nowcast.length > 5 ? nowcast[5] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 11 ? nowcast[11] : (nowcast[0] || nowFrame)),
                            (nowcast.length > 17 ? nowcast[17] : (nowcast[0] || nowFrame))
                        ];

                        radarFrames = compiled.map(function(f) {
                            var cleanHost = rainViewerHost.replace(/\/$/, '');
                            var cleanPath = (f.path || '').replace(/\/$/, '');
                            return {
                                time: f.time,
                                path: f.path,
                                tileUrl: cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png'
                            };
                        });

                        preloadRadarSourcesAndLayers();
                        if (currentLayerType === 'RAINFALL') {
                            displayFrameAtIndex(activeTimelineIndex);
                        }
                    } else {
                        showRadarUnavailable('Radar temporarily unavailable');
                    }
                })
                .catch(function(err) {
                    showLoader(false);
                    showRadarUnavailable('Radar temporarily unavailable (Offline)');
                });
        }

        // WebGL Optimization: Pre-add MapLibre raster sources and layers for instant 60 FPS switching
        function preloadRadarSourcesAndLayers() {
            if (!map) return;

            radarFrames.forEach(function(frame) {
                var sourceId = 'radar-src-' + frame.time;
                var layerId = 'radar-lyr-' + frame.time;

                var cleanHost = rainViewerHost.replace(/\/$/, '');
                var cleanPath = (frame.path || '').replace(/\/$/, '');
                var tileUrl = frame.tileUrl || (cleanHost + cleanPath + '/256/{z}/{x}/{y}/2/1_1.png');

                if (!map.getSource(sourceId)) {
                    map.addSource(sourceId, {
                        type: 'raster',
                        tiles: [tileUrl],
                        tileSize: 256,
                        minzoom: 0,
                        maxzoom: 18
                    });
                }

                if (!map.getLayer(layerId)) {
                    map.addLayer({
                        id: layerId,
                        type: 'raster',
                        source: sourceId,
                        paint: {
                            'raster-opacity': 0, // start invisible
                            'raster-fade-duration': 0
                        }
                    });
                }
            });
        }

        function setTimelineIndex(index) {
            activeTimelineIndex = Math.max(0, Math.min(6, index));
            if (mapLoaded && currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            }
        }

        function displayFrameAtIndex(index) {
            if (!map || radarFrames.length === 0) return;

            var targetFrame = radarFrames[index];
            if (!targetFrame) return;

            var targetTime = targetFrame.time;

            radarFrames.forEach(function(frame) {
                var layerId = 'radar-lyr-' + frame.time;
                if (map.getLayer(layerId)) {
                    if (frame.time === targetTime) {
                        map.setPaintProperty(layerId, 'raster-opacity', radarOpacity);
                        map.setLayoutProperty(layerId, 'visibility', 'visible');
                    } else {
                        map.setPaintProperty(layerId, 'raster-opacity', 0);
                        map.setLayoutProperty(layerId, 'visibility', 'none');
                    }
                }
            });

            invalidateMapSize();
        }

        function updateWeatherLayers() {
            if (!map) return;
            hideRadarUnavailable();

            if (map.getLayer('owm-layer')) {
                map.setLayoutProperty('owm-layer', 'visibility', 'none');
            }

            if (currentLayerType === 'RAINFALL') {
                displayFrameAtIndex(activeTimelineIndex);
            } else {
                radarFrames.forEach(function(frame) {
                    var layerId = 'radar-lyr-' + frame.time;
                    if (map.getLayer(layerId)) {
                        map.setLayoutProperty(layerId, 'visibility', 'none');
                    }
                });

                var isApiKeyValid = (weatherApiKey && 
                                     !weatherApiKey.includes('PLACEholder') && 
                                     !weatherApiKey.includes('placeholder') && 
                                     weatherApiKey !== 'MY_WEATHER_KEY' && 
                                     weatherApiKey.trim() !== '');

                var layerCode = '';
                switch (currentLayerType) {
                    case 'CLOUD_COVER': layerCode = 'clouds_new'; break;
                    case 'TEMPERATURE': layerCode = 'temp_new'; break;
                    case 'WIND_SPEED': layerCode = 'wind_new'; break;
                    case 'PRESSURE': layerCode = 'pressure_new'; break;
                    case 'HUMIDITY': layerCode = 'precipitation_new'; break;
                    case 'SATELLITE': layerCode = 'clouds_new'; break;
                    case 'LIGHTNING': layerCode = 'precipitation_new'; break;
                }

                if (isApiKeyValid && layerCode) {
                    showLoader(true, 'Fetching OpenWeatherMap Overlay...');
                    var owmUrl = 'https://tile.openweathermap.org/map/' + layerCode + '/{z}/{x}/{y}.png?appid=' + weatherApiKey;

                    if (map.getSource('owm-src')) {
                        map.getSource('owm-src').setTiles([owmUrl]);
                    } else {
                        map.addSource('owm-src', {
                            type: 'raster',
                            tiles: [owmUrl],
                            tileSize: 256
                        });
                    }

                    if (!map.getLayer('owm-layer')) {
                        map.addLayer({
                            id: 'owm-layer',
                            type: 'raster',
                            source: 'owm-src',
                            paint: {
                                'raster-opacity': 0.75,
                                'raster-fade-duration': 0
                            }
                        });
                    } else {
                        map.setLayoutProperty('owm-layer', 'visibility', 'visible');
                    }

                    setTimeout(function() { showLoader(false); }, 1000);
                } else {
                    if (window.AndroidMap) {
                        window.AndroidMap.onApiKeyMissing(currentLayerType);
                    }
                    showRadarUnavailable(currentLayerType + ' Overlay requires valid API key');
                }
            }
        }

        function safeInit() {
            console.log('SkySphere JS: safeInit starting execution');
            var attempts = 0;
            function check() {
                if (typeof maplibregl !== 'undefined') {
                    console.log('SkySphere JS: maplibregl detected, initializing map engine...');
                    initializeMapEngine();
                } else {
                    attempts++;
                    console.warn('SkySphere JS: Waiting for maplibregl... attempt ' + attempts);
                    if (attempts < 50) {
                        setTimeout(check, 100);
                    } else {
                        console.error('SkySphere JS: CRITICAL - maplibregl failed to load after 50 attempts!');
                        showError('Script Load Failure', 'Failed to resolve MapLibre GL JS engine library.');
                    }
                }
            }
            check();
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            safeInit();
        } else {
            window.addEventListener('DOMContentLoaded', safeInit);
        }
    </script>
</body>
</html>
